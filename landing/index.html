<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unbreakable Vow</title>
  <meta name="description" content="Put real money behind your word. Break your vow, lose your stake.">
  <meta property="og:title" content="Unbreakable Vow">
  <meta property="og:description" content="Put real money behind your word.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://unbreakablevow.app">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #030508;
      color: #E8E5E0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Ambient glow */
    .glow {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0;
      animation: glowIn 3s ease-out 0.5s forwards;
    }
    .glow-gold {
      background: radial-gradient(circle, rgba(212,162,79,0.15), transparent 70%);
      top: 30%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    .glow-blue {
      background: radial-gradient(circle, rgba(74,123,247,0.08), transparent 70%);
      top: 60%;
      left: 30%;
      transform: translate(-50%, -50%);
      width: 400px;
      height: 400px;
      animation-delay: 1s;
    }

    @keyframes glowIn {
      to { opacity: 1; }
    }

    /* Content */
    .content {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 40px 24px;
      max-width: 600px;
    }

    .star {
      font-size: 32px;
      color: #D4A24F;
      opacity: 0;
      animation: fadeUp 1s ease-out 0.3s forwards;
      margin-bottom: 32px;
      filter: drop-shadow(0 0 20px rgba(212,162,79,0.4));
    }

    .title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(42px, 8vw, 72px);
      font-weight: 800;
      letter-spacing: -2px;
      line-height: 1.05;
      color: #E8E5E0;
      opacity: 0;
      animation: fadeUp 1.2s ease-out 0.6s forwards;
      margin-bottom: 24px;
    }

    .title span {
      background: linear-gradient(135deg, #D4A24F, #E8C87A);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: clamp(16px, 3vw, 20px);
      color: rgba(232,229,224,0.5);
      line-height: 1.6;
      opacity: 0;
      animation: fadeUp 1s ease-out 1s forwards;
      margin-bottom: 48px;
      font-weight: 400;
    }

    .line {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(212,162,79,0.4), transparent);
      margin: 0 auto 48px;
      opacity: 0;
      animation: fadeUp 1s ease-out 1.3s forwards;
    }

    .coming {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: rgba(212,162,79,0.6);
      opacity: 0;
      animation: fadeUp 1s ease-out 1.5s forwards;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Pulse on the star */
    @keyframes pulse {
      0%, 100% { filter: drop-shadow(0 0 20px rgba(212,162,79,0.4)); }
      50% { filter: drop-shadow(0 0 40px rgba(212,162,79,0.6)); }
    }
    .star { animation: fadeUp 1s ease-out 0.3s forwards, pulse 4s ease-in-out 2s infinite; }
  </style>
</head>
<body>
  <div class="glow glow-gold"></div>
  <div class="glow glow-blue"></div>

  <div class="content">
    <div class="star">&#9733;</div>
    <h1 class="title">Make a vow.<br>Put <span>real money</span><br>behind it.</h1>
    <p class="subtitle">Name a witness. Set the stakes. Break your word, lose your stake. No excuses.</p>
    <div class="line"></div>
    <p class="coming">Coming soon</p>
  </div>
</body>
</html>
