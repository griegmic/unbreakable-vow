<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Unbreakable Vow</title>
  <meta name="description" content="One vow. One witness. Money on the line.">
  <meta property="og:title" content="Unbreakable Vow">
  <meta property="og:description" content="One vow. One witness. Money on the line.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://unbreakablevow.app">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #030508;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .scene {
      position: relative;
      width: 100%;
      height: 100vh;
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Ambient orb */
    .orb {
      position: fixed;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: rgba(212,162,79,0.06);
      top: 35%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    /* Intro lines */
    .lines {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .lines.dissolve {
      opacity: 0;
      transform: translateY(-30px);
    }
    .lines.hidden { display: none; }

    .intro-line {
      font-family: 'Playfair Display', Georgia, serif;
      color: #D4A24F;
      font-size: clamp(28px, 6vw, 34px);
      font-weight: 700;
      text-align: center;
      letter-spacing: -1px;
      text-shadow: 0 4px 20px rgba(212,162,79,0.3);
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .intro-line.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* Oath section */
    .oath-wrap {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 36px;
      padding: 0 32px;
      opacity: 0;
      transform: translateY(14px);
      transition: opacity 0.6s ease, transform 0.6s ease;
      pointer-events: none;
    }
    .oath-wrap.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .oath-text {
      font-family: 'Playfair Display', Georgia, serif;
      color: #D4A24F;
      font-size: clamp(22px, 5vw, 28px);
      font-weight: 700;
      text-align: center;
      line-height: 1.45;
      letter-spacing: -0.5px;
      text-shadow: 0 4px 16px rgba(212,162,79,0.25);
    }

    .swear-btn {
      width: 100%;
      max-width: 320px;
      min-height: 56px;
      border: none;
      border-radius: 18px;
      background: linear-gradient(135deg, #D4A24F, #B8892E, #96701F);
      color: #0B0D11;
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 17px;
      font-weight: 800;
      letter-spacing: 0.3px;
      cursor: pointer;
      box-shadow: 0 12px 24px rgba(212,162,79,0.35);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      opacity: 0;
      transform: translateY(10px);
    }
    .swear-btn.visible {
      opacity: 1;
      transform: translateY(0);
      transition: opacity 0.4s ease 0.2s, transform 0.4s ease 0.2s;
    }
    .swear-btn:hover {
      transform: scale(1.02);
      box-shadow: 0 16px 32px rgba(212,162,79,0.45);
    }
    .swear-btn:active {
      transform: scale(0.96);
    }

    /* Bloom effect */
    .bloom {
      position: fixed;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(212,162,79,0.8), rgba(212,162,79,0.2));
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      pointer-events: none;
      opacity: 0;
    }
    .bloom.active {
      animation: bloomOut 0.8s ease-out forwards;
    }
    @keyframes bloomOut {
      0% { opacity: 0.6; transform: translate(-50%, -50%) scale(0); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(12); }
    }

    /* Final reveal */
    .reveal {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      opacity: 0;
      transform: translateY(20px);
      pointer-events: none;
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
      transition: opacity 1s ease, transform 1s ease;
      pointer-events: auto;
    }

    .reveal-star {
      font-size: 28px;
      color: #D4A24F;
      filter: drop-shadow(0 0 20px rgba(212,162,79,0.4));
      animation: pulse 4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { filter: drop-shadow(0 0 20px rgba(212,162,79,0.4)); }
      50% { filter: drop-shadow(0 0 40px rgba(212,162,79,0.6)); }
    }

    .reveal-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(36px, 8vw, 56px);
      font-weight: 800;
      color: #E8E5E0;
      text-align: center;
      letter-spacing: -2px;
      line-height: 1.1;
    }

    .reveal-line {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(212,162,79,0.4), transparent);
    }

    .reveal-coming {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: rgba(212,162,79,0.5);
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="orb"></div>

    <div class="lines" id="lines">
      <div class="intro-line" id="line1">One vow.</div>
      <div class="intro-line" id="line2">One witness.</div>
      <div class="intro-line" id="line3">Money on the line.</div>
    </div>

    <div class="oath-wrap" id="oath">
      <div class="oath-text">Do you solemnly swear<br>to keep your word this week?</div>
      <button class="swear-btn" id="swearBtn" onclick="handleSwear()">I swear it</button>
    </div>

    <div class="bloom" id="bloom"></div>

    <div class="reveal" id="reveal">
      <div class="reveal-star">&#9733;</div>
      <div class="reveal-title">Unbreakable Vow</div>
      <div class="reveal-line"></div>
      <div class="reveal-coming">Coming soon</div>
    </div>
  </div>

  <script>
    const line1 = document.getElementById('line1');
    const line2 = document.getElementById('line2');
    const line3 = document.getElementById('line3');
    const lines = document.getElementById('lines');
    const oath = document.getElementById('oath');
    const swearBtn = document.getElementById('swearBtn');
    const bloom = document.getElementById('bloom');
    const reveal = document.getElementById('reveal');

    function delay(ms) {
      return new Promise(r => setTimeout(r, ms));
    }

    async function runIntro() {
      await delay(400);
      line1.classList.add('visible');

      await delay(1100);
      line2.classList.add('visible');

      await delay(1100);
      line3.classList.add('visible');

      await delay(1400);

      // Dissolve lines
      lines.classList.add('dissolve');
      await delay(500);
      lines.classList.add('hidden');

      // Show oath
      await delay(300);
      oath.classList.add('visible');
      await delay(200);
      swearBtn.classList.add('visible');
    }

    function handleSwear() {
      // Hide oath
      oath.style.transition = 'opacity 0.3s ease';
      oath.style.opacity = '0';

      // Bloom
      bloom.classList.add('active');

      setTimeout(function() {
        oath.style.display = 'none';
        reveal.classList.add('visible');
      }, 800);
    }

    runIntro();
  </script>
</body>
</html>
