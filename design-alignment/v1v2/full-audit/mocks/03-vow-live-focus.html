<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vow live focus mock</title>
  <style>
    :root{--bg:#0f0d0a;--card:#181512;--line:rgba(240,233,219,.1);--gold:#d8aa43;--gold2:#e8bd5d;--text:#f0e9db;--muted:#a49a85;--dim:#716958;--green:#4ade80;font-family:"Inter Tight",-apple-system,BlinkMacSystemFont,sans-serif}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text)} .screen{min-height:100dvh;max-width:430px;margin:0 auto;padding:24px 22px 28px;background:radial-gradient(500px 350px at 50% 10%,rgba(216,170,67,.1),transparent 64%),var(--bg)} .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;color:var(--muted);font-size:28px}.status{text-align:center;text-transform:uppercase;letter-spacing:.22em;color:var(--green);font-size:13px;font-weight:850;margin-bottom:18px}.card{border:1px solid var(--line);background:var(--card);border-radius:18px;padding:18px;margin-bottom:14px}.label{text-transform:uppercase;letter-spacing:.22em;color:var(--dim);font-size:10px;font-weight:850;margin-bottom:10px}.vow{font:500 29px/1.08 Georgia,serif;margin:0 0 16px}.vow em{color:var(--gold);font-style:italic}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;border-top:1px dashed var(--line);padding-top:14px}.k{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--dim);font-weight:850}.v{margin-top:5px;font-weight:850;font-size:16px}.gold{color:var(--gold2)}.count{border:1px solid rgba(216,170,67,.32);background:rgba(216,170,67,.08);text-align:center}.numbers{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.num{font:500 40px Georgia,serif;color:var(--gold2)}.unit{font-size:10px;text-transform:uppercase;letter-spacing:.2em;color:var(--dim);font-weight:850}.next{margin:18px 0 12px;color:var(--muted);font-size:16px;line-height:1.4}.next b{color:var(--text)}.cta{width:100%;height:58px;border:0;border-radius:16px;background:linear-gradient(180deg,var(--gold2),var(--gold));color:#15100a;font-weight:850;font-size:17px;margin-bottom:10px}.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}.tile{height:56px;border:1px solid var(--line);background:var(--card);border-radius:14px;color:var(--text);font-weight:750}.activity{margin-top:22px;color:var(--dim);letter-spacing:.24em;text-transform:uppercase;font-size:11px;font-weight:850}
  </style>
</head>
<body>
  <main class="screen">
    <div class="top"><span>&lt;</span><span>=</span></div>
    <div class="status">Vow live</div>
    <section class="card">
      <div class="label">The vow</div>
      <p class="vow"><em>I'll</em> Finish Unbreakable Vow.</p>
      <div class="grid"><div><div class="k">On hold</div><div class="v gold">$10</div></div><div><div class="k">If broken</div><div class="v">ALS</div></div><div><div class="k">Judge</div><div class="v">Joe</div></div></div>
    </section>
    <section class="card count">
      <div class="label">Time until verdict</div>
      <div class="numbers"><div><div class="num">7</div><div class="unit">Days</div></div><div><div class="num">13</div><div class="unit">Hrs</div></div><div><div class="num">38</div><div class="unit">Min</div></div><div><div class="num">18</div><div class="unit">Sec</div></div></div>
      <p class="next">Verdict by <b>Sat, May 2 at 11:59 PM</b></p>
    </section>
    <p class="next"><b>Next:</b> keep your word. If you finish early, ask Joe to release you.</p>
    <button class="cta">Text Joe: keep me honest</button>
    <div class="two"><button class="tile">I did it early</button><button class="tile">Share vow</button></div>
    <div class="activity">Activity</div>
  </main>
</body>
</html>
