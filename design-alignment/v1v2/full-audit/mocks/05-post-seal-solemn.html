<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Post seal solemn mock</title>
  <style>
    :root{--bg:#0f0d0a;--card:#181512;--line:rgba(240,233,219,.1);--gold:#d8aa43;--gold2:#e8bd5d;--text:#f0e9db;--muted:#a49a85;--dim:#716958;--green:#34c759;font-family:"Inter Tight",-apple-system,BlinkMacSystemFont,sans-serif}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text)}.screen{height:100dvh;max-width:430px;margin:0 auto;padding:58px 28px 24px;display:flex;flex-direction:column;text-align:center;background:radial-gradient(520px 400px at 50% 18%,rgba(216,170,67,.18),transparent 64%),var(--bg)}.seal{width:78px;height:78px;border-radius:24px;background:linear-gradient(135deg,var(--gold2),var(--gold));display:grid;place-items:center;margin:0 auto 28px;box-shadow:0 0 36px rgba(216,170,67,.28)}.diamond{width:27px;height:27px;background:#17110a;transform:rotate(45deg)}.eyebrow{color:var(--gold);letter-spacing:.26em;text-transform:uppercase;font-size:11px;font-weight:850;margin-bottom:10px}h1{font:500 48px/1 Georgia,serif;margin:0 0 12px}.sub{font-size:18px;line-height:1.42;color:var(--muted);font-weight:600;margin:0 auto 26px;max-width:280px}.card{border:1px solid var(--line);background:var(--card);border-radius:18px;padding:18px;text-align:left}.label{color:var(--dim);letter-spacing:.22em;text-transform:uppercase;font-size:10px;font-weight:850;margin-bottom:10px}.msg{font-size:17px;line-height:1.45;color:var(--muted);font-weight:650}.msg b{color:var(--text)}.msg a{color:var(--gold2)}.spacer{flex:1}.cta{height:58px;border:0;border-radius:999px;background:linear-gradient(180deg,var(--green),#28a94c);color:white;font-size:17px;font-weight:850;width:100%;box-shadow:0 18px 40px rgba(52,199,89,.18)}.secondary{background:transparent;border:0;color:var(--muted);margin-top:16px;font-weight:750}.micro{margin-top:18px;color:var(--dim);font-size:12px;line-height:1.35}
  </style>
</head>
<body>
  <main class="screen">
    <div class="seal"><div class="diamond"></div></div>
    <div class="eyebrow">Sealed</div>
    <h1>It is live.</h1>
    <p class="sub">Now get Nick in. The vow starts when your witness accepts.</p>
    <section class="card">
      <div class="label">Your text to Nick</div>
      <div class="msg"><b>I put $50 on my vow.</b> You are the judge. Takes 5 sec to accept: <a>unbreakablevow.app/w/abc123</a></div>
    </section>
    <div class="spacer"></div>
    <button class="cta">Text Nick the invite</button>
    <button class="secondary">Copy link instead</button>
    <div class="micro">No confetti. Just a locked door clicking shut.</div>
  </main>
</body>
</html>
