<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Vow Broken · Cause-You-Hate</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500&family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0F0D0A; --surface: #181512; --surface-2: #1F1B16;
    --text: #F0E9DB; --text-mute: #A49A85; --text-dim: #726A5A;
    --gold: #C89B3C; --gold-bright: #E8B656; --gold-deep: #8B6820;
    --gold-line: rgba(200,155,60,0.18);
    --rule: rgba(240,233,219,0.08);
    --red: #C8443A; --red-deep: #8C2D26;
    --red-soft: rgba(200,68,58,0.14);
    --serif: "Fraunces", Georgia, serif;
    --sans: "Inter Tight", -apple-system, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 393px; height: 852px; overflow: hidden; }
  body {
    /* "broken" gradient with stronger red wash for cause-you-hate */
    background: var(--bg);
    background-image:
      radial-gradient(ellipse 700px 480px at 50% 26%, rgba(200,68,58,0.18), transparent 64%),
      radial-gradient(ellipse 800px 500px at 50% 100%, rgba(140,45,38,0.10), transparent 70%);
    color: var(--text); font-family: var(--sans); font-size: 15px;
    -webkit-font-smoothing: antialiased;
  }
  .screen {
    display: flex; flex-direction: column;
    height: 100%; padding: 70px 28px 28px;
    align-items: center; text-align: center;
  }

  /* Broken seal + red shield overlay */
  .seal-wrap {
    position: relative;
    width: 108px; height: 108px;
    margin-bottom: 22px;
  }
  .broken-seal {
    position: relative; width: 96px; height: 96px;
    margin: 0 auto;
    filter: drop-shadow(0 12px 24px rgba(140,40,30,0.4));
  }
  .shield-overlay {
    position: absolute;
    bottom: -6px; right: -6px;
    width: 44px; height: 50px;
    filter: drop-shadow(0 4px 10px rgba(200,68,58,0.45));
  }

  h1 {
    font-family: var(--serif); font-style: italic; font-weight: 500;
    font-variation-settings: "opsz" 144;
    font-size: 38px; line-height: 1.04; letter-spacing: -0.025em;
    color: var(--text);
    margin-bottom: 12px;
  }
  .sub {
    font-family: var(--serif); font-style: italic; font-weight: 400;
    font-size: 17px; line-height: 1.4;
    color: var(--text-mute);
    margin-bottom: 26px;
    max-width: 320px;
  }
  .sub b.amount { color: var(--text); font-weight: 500; font-style: italic; }
  .sub b.dest {
    color: var(--red); font-weight: 600; font-style: italic;
    text-shadow: 0 0 16px rgba(200,68,58,0.32);
  }

  /* Receipt */
  .receipt {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--rule);
    border-radius: 14px;
    padding: 16px 18px 14px;
    margin-bottom: 22px;
    position: relative;
    text-align: left;
  }
  .receipt::before {
    content: ""; position: absolute; top: 0; left: 22px; right: 22px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(200,68,58,0.40), transparent);
  }
  .r-label {
    font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--text-dim); font-weight: 500; margin-bottom: 8px;
  }
  .r-vow {
    font-family: var(--serif); font-style: italic; font-weight: 400;
    font-size: 16px; line-height: 1.25; color: var(--text);
    margin-bottom: 10px;
  }
  .r-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 0;
    border-top: 1px dashed var(--rule);
  }
  .r-k {
    font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--text-dim); font-weight: 500;
  }
  .r-v {
    font-family: var(--serif); font-weight: 500; font-size: 13.5px;
    color: var(--text); font-feature-settings: "tnum";
  }
  .r-v .arrow { color: var(--text-dim); font-family: var(--sans); margin: 0 4px; }
  .r-v .dest-red {
    color: var(--red); font-style: italic; font-weight: 600;
    text-shadow: 0 0 14px rgba(200,68,58,0.28);
  }
  .r-v.muted { color: var(--text-mute); font-style: italic; font-weight: 400; }

  .spacer { flex: 1; }

  /* Primary CTA — gold (let's make this back) */
  .cta {
    width: 100%; height: 60px; border-radius: 14px;
    background: linear-gradient(180deg, #D4A94A, #B88930);
    color: #1A1205;
    font-family: var(--serif); font-weight: 500;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    gap: 8px;
    box-shadow:
      0 1px 0 rgba(255,220,140,0.3) inset,
      0 12px 32px rgba(200,155,60,0.22);
    margin-bottom: 14px;
    text-align: center;
    line-height: 1.15;
    padding: 0 14px;
  }

  .secondaries {
    display: flex; flex-direction: column; gap: 10px;
  }
  .sec-link {
    font-family: var(--sans); font-size: 13px; font-weight: 500;
    color: var(--text-mute);
    text-align: center;
  }
</style>
</head>
<body>
<div class="screen">

  <!-- Broken seal with red shield overlay -->
  <div class="seal-wrap">
    <div class="broken-seal">
      <svg viewBox="0 0 96 96" width="96" height="96" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="bs2-gold" cx="35%" cy="28%" r="70%">
            <stop offset="0%" stop-color="#B8954A"/>
            <stop offset="40%" stop-color="#A88840"/>
            <stop offset="80%" stop-color="#7A5C1A"/>
            <stop offset="100%" stop-color="#4F3A0E"/>
          </radialGradient>
        </defs>
        <path d="M48 6 a42 42 0 0 0 -36 60 l30 -16 l-2 -16 l8 -10 l4 -8 z"
              fill="url(#bs2-gold)" stroke="#3A2C0C" stroke-width="0.8" transform="translate(-3 0)"/>
        <path d="M48 6 a42 42 0 0 1 36 60 l-30 -16 l2 -16 l-8 -10 l-4 -8 z"
              fill="url(#bs2-gold)" stroke="#3A2C0C" stroke-width="0.8" transform="translate(3 0)"/>
        <path d="M12 66 a42 42 0 0 0 30 24 l8 -22 l-12 -10 l-6 8 l-12 8 z"
              fill="url(#bs2-gold)" stroke="#3A2C0C" stroke-width="0.8" transform="translate(-2 2)"/>
        <path d="M84 66 a42 42 0 0 1 -30 24 l-8 -22 l12 -10 l6 8 l12 8 z"
              fill="url(#bs2-gold)" stroke="#3A2C0C" stroke-width="0.8" transform="translate(2 2)"/>
        <path d="M44 4 L48 22 L42 36 L52 50 L46 64 L52 88"
              fill="none" stroke="#1A1205" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>
    <!-- Red shield overlay (the money DID go to your hated cause — double sting) -->
    <svg class="shield-overlay" viewBox="0 0 44 50" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="rsh" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#D8584C"/>
          <stop offset="100%" stop-color="#8C2D26"/>
        </linearGradient>
      </defs>
      <path d="M22 1 L42 6 L42 26 C42 36 33 44 22 48 C11 44 2 36 2 26 L2 6 Z"
            fill="url(#rsh)" stroke="#5A1F1A" stroke-width="0.8"/>
      <!-- ban / X mark inside -->
      <circle cx="22" cy="22" r="9" fill="none" stroke="#FFE2DD" stroke-width="2"/>
      <line x1="15" y1="15" x2="29" y2="29" stroke="#FFE2DD" stroke-width="2" stroke-linecap="round"/>
    </svg>
  </div>

  <h1>Brutal. You broke it.</h1>
  <div class="sub">
    <b class="amount">$25</b> just went to <b class="dest">Trump</b>.
  </div>

  <!-- Receipt -->
  <div class="receipt">
    <div class="r-label">— The Receipt —</div>
    <div class="r-vow">Go to the gym 3x.</div>
    <div class="r-row">
      <span class="r-k">Money</span>
      <span class="r-v">$25 <span class="arrow">→</span> <span class="dest-red">Trump</span></span>
    </div>
    <div class="r-row">
      <span class="r-k">Streak</span>
      <span class="r-v muted">Streak ended at 3</span>
    </div>
  </div>

  <div class="spacer"></div>

  <!-- Primary CTA — forward motion. The sting speaks for itself. -->
  <div class="cta">
    <span>Make a new vow — let's make this back</span>
    <span>→</span>
  </div>

  <div class="secondaries">
    <div class="sec-link gold">Post the damage →</div>
  </div>

</div>
</body>
</html>
