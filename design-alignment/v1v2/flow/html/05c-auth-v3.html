<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500&family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0F0D0A; --surface: #181512; --surface-2: #1F1B16;
    --text: #F0E9DB; --text-mute: #A49A85; --text-dim: #726A5A;
    --gold: #C89B3C; --gold-bright: #E8B656; --gold-line: rgba(200,155,60,0.22);
    --gold-soft: rgba(200,155,60,0.10);
    --rule: rgba(240,233,219,0.08);
    --serif: "Fraunces", Georgia, serif;
    --sans: "Inter Tight", -apple-system, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 393px; height: 852px; overflow: hidden; }
  body {
    background: var(--bg);
    background-image: radial-gradient(ellipse at top, rgba(200,155,60,0.06), transparent 60%);
    color: var(--text); font-family: var(--sans); font-size: 15px;
    -webkit-font-smoothing: antialiased;
  }
  .screen { display: flex; flex-direction: column; height: 100%; padding: 44px 22px 24px; }

  .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; padding: 0 6px; }
  .back { font-size: 22px; color: var(--text-mute); }
  .judge-pill {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--gold-soft);
    border: 1px solid var(--gold-line);
    border-radius: 999px;
    padding: 4px 12px 4px 4px;
  }
  .judge-pill-av {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--surface-2);
    border: 1px solid var(--rule);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--serif); font-size: 11px; font-weight: 500;
    color: var(--gold-bright);
  }
  .judge-pill-l {
    font-family: var(--serif); font-style: italic;
    font-size: 11.5px; color: var(--text-mute);
  }
  .judge-pill-name {
    font-family: var(--serif); font-weight: 500; font-size: 12px;
    color: var(--text);
  }

  /* H1 — bigger, centered to land like the inspiration */
  h1 {
    font-family: var(--serif); font-weight: 400;
    font-variation-settings: "opsz" 144;
    font-size: 36px; line-height: 1.0; letter-spacing: -0.02em;
    text-align: center;
    margin-bottom: 10px;
  }
  h1 em { font-style: italic; color: var(--gold); }
  .sub {
    text-align: center;
    font-family: var(--sans); font-size: 13.5px; line-height: 1.5;
    color: var(--text-mute);
    margin-bottom: 22px;
    padding: 0 16px;
  }
  .sub b { color: var(--text); font-weight: 500; }

  /* Vow preview chip — borrowed from inspiration, UV-styled */
  .vow-chip {
    display: flex; align-items: center; gap: 10px;
    margin: 0 6px 18px;
    padding: 10px 14px;
    border: 1px solid var(--gold-line);
    background: var(--gold-soft);
    border-radius: 12px;
  }
  .vow-chip::before {
    content: ""; width: 3px; height: 26px;
    background: var(--gold);
    border-radius: 2px;
    margin-right: 2px;
  }
  .vow-chip-text {
    flex: 1;
    font-family: var(--serif); font-style: italic;
    font-size: 12.5px; line-height: 1.3; color: var(--text);
  }
  .vow-chip-meta {
    font-family: var(--serif); font-weight: 500;
    font-size: 13px; color: var(--gold-bright);
    font-feature-settings: "tnum";
    padding-left: 10px;
    border-left: 1px solid var(--rule);
    white-space: nowrap;
  }

  /* Phone field — slightly bigger, more confident */
  .phone-row {
    display: flex; gap: 8px; margin: 0 6px 10px;
  }
  .country {
    width: 76px; height: 60px;
    border: 1px solid var(--rule);
    border-radius: 12px;
    background: var(--surface);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--serif); font-weight: 500; font-size: 14px;
    color: var(--text-mute);
    gap: 6px;
  }
  .phone-input {
    flex: 1; height: 60px;
    border: 1px solid var(--gold-line);
    border-radius: 12px;
    background: var(--surface);
    padding: 0 18px;
    font-family: var(--serif); font-weight: 500;
    font-variation-settings: "opsz" 144;
    font-size: 22px; letter-spacing: 0.005em;
    color: var(--text);
    display: flex; align-items: center;
    box-shadow: 0 0 0 3px rgba(200,155,60,0.08);
  }
  .phone-input .typed { color: var(--text); font-feature-settings: "tnum"; }
  .phone-input .caret {
    display: inline-block; width: 2px; height: 26px;
    background: var(--gold-bright); margin-left: 2px;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* CTA — copy reframed: it's about the meaning, not the mechanic */
  .cta {
    width: 100%; height: 60px; border-radius: 14px;
    background: linear-gradient(180deg, #D4A94A, #B88930);
    color: #1A1205; font-family: var(--serif); font-weight: 500;
    font-size: 17px; letter-spacing: 0.005em;
    display: flex; align-items: center; justify-content: center;
    gap: 8px;
    box-shadow: 0 1px 0 rgba(255,220,140,0.25) inset, 0 10px 30px rgba(200,155,60,0.18);
    margin: 0 6px 8px;
  }
  .cta-help {
    text-align: center;
    font-family: var(--serif); font-style: italic;
    font-size: 11.5px; color: var(--text-dim);
    margin-bottom: 18px;
  }

  /* Other ways — three-up row, cleaner than a single text link */
  .other-divider {
    display: flex; align-items: center; gap: 10px;
    margin: 0 6px 12px;
  }
  .other-divider::before, .other-divider::after {
    content: ""; flex: 1; height: 1px; background: var(--rule);
  }
  .other-divider span {
    font-size: 9.5px; letter-spacing: 0.28em; text-transform: uppercase;
    color: var(--text-dim); font-weight: 500;
  }
  .other-row {
    display: flex; gap: 8px; margin: 0 6px;
  }
  .other-btn {
    flex: 1; height: 46px;
    border: 1px solid var(--rule);
    background: var(--surface);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    gap: 6px;
    font-family: var(--sans); font-weight: 500; font-size: 13px;
    color: var(--text-mute);
  }
  .other-btn .ic {
    font-family: var(--serif); font-weight: 500; font-size: 14px;
    color: var(--text-mute);
  }

  .footer { margin-top: auto; padding: 0 6px; }
  .micro {
    text-align: center;
    font-size: 10px; color: var(--text-dim);
    letter-spacing: 0.04em; line-height: 1.5;
  }
  .micro .stripe { font-weight: 500; color: var(--text-mute); }
</style>
</head>
<body>
<div class="screen">
  <div class="topbar">
    <div class="back">←</div>
    <div class="judge-pill">
      <div class="judge-pill-av">N</div>
      <div class="judge-pill-l">judge:</div>
      <div class="judge-pill-name">Nick</div>
    </div>
  </div>

  <h1>Make it <em>real.</em></h1>
  <div class="sub">Your number ties this vow to <b>you</b>. Apple Pay places the hold next.</div>

  <!-- Vow chip — reminds them WHY they're entering their number -->
  <div class="vow-chip">
    <div class="vow-chip-text">"Gym Mon, Wed &amp; Fri this week"</div>
    <div class="vow-chip-meta">$50</div>
  </div>

  <div class="phone-row">
    <div class="country">🇺🇸 +1</div>
    <div class="phone-input">
      <span class="typed">(415) 555&nbsp;</span><span class="caret"></span>
    </div>
  </div>

  <div class="cta">Lock my word in →</div>
  <div class="cta-help">We'll text a 6-digit code · auto-fills on iOS</div>

  <div class="other-divider"><span>or</span></div>
  <div class="other-row">
    <div class="other-btn"><span class="ic"></span>Apple</div>
    <div class="other-btn"><span class="ic">G</span>Google</div>
    <div class="other-btn"><span class="ic">@</span>Email</div>
  </div>

  <div class="footer">
    <div class="micro">Held by <span class="stripe">Stripe</span> · Nothing charges unless you break it</div>
  </div>
</div>
</body>
</html>
