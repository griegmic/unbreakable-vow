<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400&family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0F0D0A; --surface: #181512;
    --text: #F0E9DB; --text-mute: #A49A85; --text-dim: #726A5A;
    --gold: #C89B3C; --gold-bright: #E8B656;
    --rule: rgba(240,233,219,0.08);
    --serif: "Fraunces", Georgia, serif;
    --sans: "Inter Tight", -apple-system, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 393px; height: 852px; overflow: hidden; }
  body {
    background: var(--bg);
    background-image: radial-gradient(ellipse at 50% 30%, rgba(200,155,60,0.08), transparent 60%);
    color: var(--text); font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
  }
  .screen {
    display: flex; flex-direction: column;
    height: 100%; padding: 80px 28px 24px;
    align-items: center;
  }
  .icon-wrap {
    width: 68px; height: 68px;
    background: var(--gold);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 30px;
  }
  .icon-wrap::after {
    content: "";
    width: 22px; height: 22px;
    background: var(--bg);
    transform: rotate(45deg);
  }
  h1 {
    font-family: var(--serif); font-weight: 600;
    font-size: 38px; letter-spacing: -0.02em;
    margin-bottom: 16px;
    text-align: center;
  }
  .sub {
    text-align: center;
    font-size: 17px; line-height: 1.4;
    color: var(--text);
    margin-bottom: 38px;
  }
  .card {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--rule);
    border-radius: 18px;
    padding: 18px 20px;
    margin-bottom: 40px;
  }
  .card-label {
    font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--text-dim); font-weight: 500;
    margin-bottom: 12px;
  }
  .card-body {
    font-size: 16px; line-height: 1.5; color: var(--text);
    margin-bottom: 14px;
  }
  .card-link {
    font-size: 14px; color: var(--text-dim);
  }
  .spacer { flex: 1; }
  .cta {
    width: 100%; height: 60px; border-radius: 30px;
    background: linear-gradient(180deg, #D4A94A, #B88930);
    color: #1A1205;
    font-family: var(--sans); font-weight: 700;
    font-size: 17px;
    display: flex; align-items: center; justify-content: center;
    gap: 8px;
    box-shadow: 0 0 30px rgba(200,155,60,0.3);
    margin-bottom: 20px;
  }
  .fallback {
    text-align: center; font-size: 14px;
    color: var(--text-mute);
    text-decoration: underline;
    padding-bottom: 40px;
  }
</style>
</head>
<body>
<div class="screen">
  <div class="icon-wrap"></div>
  <h1>Sealed.</h1>
  <div class="sub">Your vow is live.<br/>Now tell Dan.</div>

  <div class="card">
    <div class="card-label">YOUR TEXT TO DAN</div>
    <div class="card-body">I vowed to run every morning this week. $50 on the line — you're the judge. Takes 5 sec to accept:</div>
    <div class="card-link">unbreakablevow.app/w/abc123</div>
  </div>

  <div class="spacer"></div>

  <div class="cta">Tell Dan 📱</div>
  <div class="fallback">Copy link instead</div>
</div>
</body>
</html>
