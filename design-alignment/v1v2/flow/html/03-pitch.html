<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500&family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0F0D0A; --surface: #1A1612; --surface-2: #221D17;
    --text: #F0E9DB; --text-mute: #A49A85; --text-dim: #726A5A;
    --gold: #C89B3C; --gold-bright: #E8B656; --gold-line: rgba(200,155,60,0.22);
    --gold-soft: rgba(200,155,60,0.10);
    --rule: rgba(240,233,219,0.08);
    --serif: "Fraunces", Georgia, serif;
    --sans: "Inter Tight", -apple-system, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 393px; height: 852px; overflow: hidden; }
  body {
    background: var(--bg);
    background-image:
      radial-gradient(ellipse 600px 400px at 50% 30%, rgba(200,155,60,0.10), transparent 70%),
      radial-gradient(ellipse 800px 500px at 50% 100%, rgba(200,155,60,0.06), transparent 70%);
    color: var(--text); font-family: var(--sans); font-size: 15px;
    -webkit-font-smoothing: antialiased;
  }
  .screen { display: flex; flex-direction: column; height: 100%; padding: 44px 22px 24px; }

  .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; padding: 0 6px; }
  .back { font-size: 22px; color: var(--text-mute); }
  .pulse {
    display: flex; align-items: center; gap: 6px;
    font-size: 10.5px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--gold); font-weight: 500;
  }
  .pulse::before {
    content: ""; width: 6px; height: 6px; border-radius: 50%;
    background: var(--gold-bright); box-shadow: 0 0 8px var(--gold);
  }

  /* Hero card — the vow as document */
  .vow-card {
    background: var(--surface);
    border: 1px solid var(--gold-line);
    border-radius: 18px;
    padding: 18px 22px 18px;
    margin-bottom: 22px;
    position: relative;
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
  }
  .vow-card::before {
    content: ""; position: absolute; top: 0; left: 28px; right: 28px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .vow-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }
  .vow-label {
    font-size: 9.5px; letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--text-dim); font-weight: 500;
  }
  .need-idea {
    font-family: var(--serif); font-style: italic; font-size: 12px;
    color: var(--gold);
  }
  .vow-text {
    font-family: var(--serif); font-weight: 400;
    font-variation-settings: "opsz" 144;
    font-size: 24px; line-height: 1.13; letter-spacing: -0.012em;
    color: var(--text); margin-bottom: 14px;
  }
  .vow-text em { font-style: italic; color: var(--gold); }
  .vow-meta {
    display: flex; align-items: stretch; gap: 0;
    border-top: 1px solid var(--rule); padding-top: 12px;
  }
  .meta-cell {
    flex: 1;
    display: flex; flex-direction: column; gap: 3px;
  }
  .meta-cell.mid { border-left: 1px solid var(--rule); padding-left: 14px; }
  .meta-cell:not(.mid) { padding-right: 14px; }
  .meta-k {
    font-size: 9px; letter-spacing: 0.24em; text-transform: uppercase;
    color: var(--text-dim); font-weight: 500;
  }
  .meta-v {
    font-family: var(--serif); font-weight: 500; font-size: 14px;
    color: var(--text); letter-spacing: -0.005em;
    font-feature-settings: "tnum";
  }

  /* Stake tiles section */
  .stake-section {
    margin-bottom: 18px;
  }
  .stake-h {
    text-align: center;
    font-size: 10px; letter-spacing: 0.32em; text-transform: uppercase;
    color: var(--text-dim); font-weight: 500;
    margin-bottom: 14px;
  }
  .stake-tiles {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 8px; margin-bottom: 12px;
  }
  .tile {
    aspect-ratio: 1.05;
    background: var(--surface);
    border: 1px solid var(--rule);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--serif); font-weight: 500;
    font-variation-settings: "opsz" 144;
    font-size: 22px; letter-spacing: -0.02em;
    color: var(--text-mute);
    font-feature-settings: "tnum";
    position: relative;
  }
  .tile.selected {
    background: linear-gradient(180deg, rgba(200,155,60,0.18), rgba(200,155,60,0.08));
    border: 1px solid var(--gold);
    color: var(--gold-bright);
    box-shadow: 0 0 24px rgba(200,155,60,0.18), 0 1px 0 rgba(232,182,86,0.25) inset;
  }
  .tile.custom { font-size: 14px; font-style: italic; color: var(--text-dim); }
  .tile.custom span { color: var(--text-mute); }

  /* Destination row */
  .dest-row {
    display: flex; align-items: center; justify-content: center;
    gap: 6px;
    font-family: var(--serif); font-style: italic; font-size: 13.5px;
    color: var(--text-mute);
    margin-bottom: 6px;
  }
  .dest-row b {
    color: var(--text); font-style: normal; font-weight: 500;
    border-bottom: 1px dotted var(--gold-line);
    padding-bottom: 1px;
  }
  .dest-change {
    font-style: normal;
    font-size: 10.5px; color: var(--text-dim);
    border-bottom: 1px dotted var(--rule);
  }

  .footer { margin-top: auto; }
  .reassure {
    text-align: center;
    font-family: var(--serif); font-style: italic;
    font-size: 11.5px; color: var(--text-dim);
    margin-bottom: 12px;
  }
  .cta {
    width: 100%; height: 60px; border-radius: 999px;
    background: #F4ECDB;
    color: #1A1205; font-family: var(--serif); font-weight: 500;
    font-size: 17px; letter-spacing: 0.005em;
    display: flex; align-items: center; justify-content: center;
    gap: 12px; padding: 0 24px;
    box-shadow: 0 1px 0 rgba(255,255,255,0.4) inset, 0 18px 40px rgba(0,0,0,0.4);
    position: relative;
  }
  .cta .amt {
    font-feature-settings: "tnum";
    color: #1A1205;
    opacity: 0.7;
  }
  .cta .arrow-pill {
    position: absolute; right: 8px; top: 8px; bottom: 8px;
    width: 44px;
    border-radius: 999px;
    background: #1A1205;
    color: #F4ECDB;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
</style>
</head>
<body>
<div class="screen">
  <div class="topbar">
    <div class="back">←</div>
    <div class="pulse">Set the weight</div>
  </div>

  <div class="vow-card">
    <div class="vow-head">
      <div class="vow-label">The Vow</div>
      <div class="need-idea">edit</div>
    </div>
    <div class="vow-text"><em>I'll</em> go to the gym Mon, Wed &amp; Fri this week.</div>
    <div class="vow-meta">
      <div class="meta-cell">
        <div class="meta-k">Verdict</div>
        <div class="meta-v">Sun, Apr 26 · 9pm</div>
      </div>
      <div class="meta-cell mid">
        <div class="meta-k">Judge</div>
        <div class="meta-v">Pick next →</div>
      </div>
    </div>
  </div>

  <div class="stake-section">
    <div class="stake-h">— Put weight on it —</div>
    <div class="stake-tiles">
      <div class="tile">$25</div>
      <div class="tile selected">$50</div>
      <div class="tile">$100</div>
      <div class="tile custom">other</div>
    </div>
    <div class="dest-row">
      If broken, goes to <b>NRA</b><span class="dest-change">change</span>
    </div>
  </div>

  <div class="footer">
    <div class="reassure">Nothing charges unless you break it.</div>
    <div class="cta">
      Pick your judge <span class="amt">— $50</span>
      <span class="arrow-pill">→</span>
    </div>
  </div>
</div>
</body>
</html>
