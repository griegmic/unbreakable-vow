<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0F0D0A; --surface: #181512; --surface-2: #1F1B16;
    --text: #F0E9DB; --text-mute: #A49A85; --text-dim: #726A5A;
    --gold: #C89B3C; --gold-soft: rgba(200,155,60,0.10);
    --gold-line: rgba(200,155,60,0.22);
    --rule: rgba(240,233,219,0.08);
    --serif: "Fraunces", Georgia, serif;
    --sans: "Inter Tight", -apple-system, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 393px; height: 852px; overflow: hidden; }
  body {
    background: var(--bg);
    background-image: radial-gradient(ellipse at top, rgba(200,155,60,0.05), transparent 60%);
    color: var(--text); font-family: var(--sans); font-size: 15px;
    -webkit-font-smoothing: antialiased;
  }
  .screen { display: flex; flex-direction: column; height: 100%; padding: 54px 28px 36px; }

  .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
  .back { font-size: 22px; color: var(--text-mute); }
  .step {
    font-size: 10px; letter-spacing: 0.26em; text-transform: uppercase;
    color: var(--text-dim); font-weight: 500;
  }
  .step b { color: var(--gold); font-weight: 500; }

  .heading-label {
    font-family: var(--serif); font-style: italic; font-size: 13px;
    color: var(--gold); margin-bottom: 12px; letter-spacing: 0.005em;
  }
  h1 {
    font-family: var(--serif); font-weight: 400;
    font-variation-settings: "opsz" 144, "SOFT" 30;
    font-size: 36px; line-height: 1.05; letter-spacing: -0.018em;
    margin-bottom: 28px;
  }
  h1 em { font-style: italic; color: var(--gold); }

  .your-vow {
    background: transparent;
    border: 1px solid var(--rule);
    border-left: 2px solid var(--gold);
    border-radius: 2px;
    padding: 18px 18px 16px;
    margin-bottom: 18px;
  }
  .vow-label {
    font-size: 10px; letter-spacing: 0.24em; text-transform: uppercase;
    color: var(--text-dim); font-weight: 500; margin-bottom: 8px;
  }
  .vow-text {
    font-family: var(--serif); font-size: 21px; line-height: 1.25;
    color: var(--text); font-style: italic; font-weight: 400;
    letter-spacing: -0.005em;
  }

  .arrow-down {
    text-align: center; margin: 6px 0;
    font-family: var(--serif); font-style: italic; font-size: 14px;
    color: var(--gold);
  }

  .sharpened {
    background: var(--gold-soft);
    border: 1px solid var(--gold-line);
    border-radius: 2px;
    padding: 20px 18px 18px;
    margin-bottom: 12px;
  }
  .sharp-label {
    font-size: 10px; letter-spacing: 0.24em; text-transform: uppercase;
    color: var(--gold); font-weight: 500; margin-bottom: 10px;
  }
  .sharp-text {
    font-family: var(--serif); font-size: 22px; line-height: 1.25;
    color: var(--text); font-weight: 500; letter-spacing: -0.005em;
  }
  .sharp-why {
    font-family: var(--sans); font-size: 12.5px; color: var(--text-mute);
    margin-top: 10px; line-height: 1.45;
  }
  .sharp-why em { font-style: italic; color: var(--gold); }

  .footer { margin-top: auto; }

  .actions { display: flex; flex-direction: column; gap: 10px; }
  .cta {
    width: 100%; height: 56px; border-radius: 14px;
    background: linear-gradient(180deg, #D4A94A, #B88930);
    color: #1A1205; font-family: var(--serif); font-weight: 500;
    font-size: 17px; letter-spacing: 0.005em;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    box-shadow: 0 1px 0 rgba(255,220,140,0.25) inset, 0 10px 30px rgba(200,155,60,0.18);
  }
  .secondary {
    width: 100%; height: 50px; border-radius: 14px;
    background: transparent;
    border: 1px solid var(--rule);
    color: var(--text-mute);
    font-family: var(--sans); font-weight: 500; font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    letter-spacing: 0.005em;
  }
  .secondary em { color: var(--text); font-style: normal; margin-left: 4px; font-weight: 500; }
</style>
</head>
<body>
<div class="screen">
  <div class="topbar">
    <div class="back">←</div>
    <div class="step"><b>2</b> · Sharpen</div>
  </div>

  <div class="heading-label">A vow your witness can call.</div>
  <h1>Make it <em>specific.</em></h1>

  <div class="your-vow">
    <div class="vow-label">Your vow</div>
    <div class="vow-text">"Get fit"</div>
  </div>

  <div class="arrow-down">↓ sharper ↓</div>

  <div class="sharpened">
    <div class="sharp-label">Suggested</div>
    <div class="sharp-text">"Go to the gym 3 times this week — Mon, Wed, Fri."</div>
    <div class="sharp-why">Pinpoints <em>when</em>, <em>how often</em>, and <em>by when</em>. Your witness has nothing to interpret.</div>
  </div>

  <div class="footer">
    <div class="actions">
      <div class="cta">Use this <span>→</span></div>
      <div class="secondary">Keep mine —<em>"Get fit"</em></div>
    </div>
  </div>
</div>
</body>
</html>
